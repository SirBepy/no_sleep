<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Sleep Page</title>
    <meta name="description" content="A lightweight web page that keeps your computer awake, no installs needed.">
    <meta property="og:title" content="No Sleep">
    <meta property="og:description"
        content="A lightweight web page that keeps your computer awake, no installs needed.">
    <meta property="og:image" content="assets/images/favicon.png">
    <meta property="og:url" content="https://sirbepy.github.io/no_sleep/">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9d7dfc">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sirbepy/sirbepy-styleguide@main/styleguide.css">
    <link rel="stylesheet" href="src/styles/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="container card">
        <div class="info-button tooltip-trigger" id="info-button">
            <i class="ph ph-info" style="font-size: 20px;"></i>
            <div class="tooltip tooltip-right">
                <p>Keep this tab open and visible to prevent your PC from sleeping.</p>
            </div>
        </div>

        <h1>No Sleep</h1>

        <div class="timer">
            <span class="running-for">Running for:</span> <br /><span id="time"></span>
        </div>

        <button class="pause-toggle" id="pause-toggle">
            <i class="ph-fill ph-pause icon-pause" style="font-size: 14px;"></i>
            <i class="ph-fill ph-play icon-play" style="font-size: 14px;"></i>
            <span>Pause</span>
        </button>
        <div class="pause-hint" id="pause-hint">Timer paused, but <b>No Sleep</b> is still keeping your PC awake.</div>
    </div>

    <div class="footer">
        Keep this tab open to prevent your system from sleeping.
    </div>

    <script type="module" src="src/scripts/build-info.js"></script>
    <script src="src/scripts/script.js"></script>
    <!-- Settings widget - comment out to disable -->
    <script src="https://cdn.jsdelivr.net/gh/sirbepy/sirbepy-styleguide@main/widget/settings.js"></script>
    <!-- Animated background. To disable: set window.BEPY_BACKGROUND = false before this tag. To use a custom SVG: set window.BEPY_BG_PATTERN = 'your-pattern.svg' before this tag. -->
    <script src="https://cdn.jsdelivr.net/gh/sirbepy/sirbepy-styleguide@main/widget/background.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./sw.js");
        }
    </script>
</body>

</html>
